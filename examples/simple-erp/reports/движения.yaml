name: ДвиженияТоваров
title: Движения товаров
params:
  - name: ВидДвижения
    type: select
    label: Вид движения
    options:
      - ""
      - Приход
      - Расход
  - name: НачалоПериода
    type: date
    label: Период с
  - name: КонецПериода
    type: date
    label: Период по
query: |
  ВЫБРАТЬ
    period КАК Период,
    recorder_type КАК Документ,
    вид_движения КАК ВидДвижения,
    Номенклатура,
    Количество,
    Сумма
  ИЗ РегистрНакопления.ТоварноеДвижение
  ГДЕ (&ВидДвижения ЕСТЬ ПУСТО ИЛИ вид_движения = &ВидДвижения)
    И (&НачалоПериода ЕСТЬ ПУСТО ИЛИ period >= &НачалоПериода)
    И (&КонецПериода ЕСТЬ ПУСТО ИЛИ period <= &КонецПериода)
  УПОРЯДОЧИТЬ ПО period, recorder_type
