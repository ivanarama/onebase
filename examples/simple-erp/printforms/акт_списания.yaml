name: АктСписания
document: Списание
title: "Акт списания № {{Номер}} от {{Дата | date}}"

header: |
  ## Акт списания товарно-материальных ценностей

  **№** {{Номер}} &nbsp;&nbsp; **от** {{Дата | date}}

  ___

table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 36px
      align: center
    - field: Номенклатура
      label: Наименование ТМЦ
    - field: Количество
      label: Кол-во
      align: right
      width: 80px
      format: "number:0"
  totals:
    - field: Количество
      sum: true
      label: "Итого"

footer: |
