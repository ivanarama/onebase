name: Взаиморасчеты
title: Взаиморасчёты с контрагентами
params:
  - name: НаДату
    type: date
    label: На дату
  - name: ТипКонтрагента
    type: select
    label: Тип
    options:
      - ""
      - Покупатель
      - Поставщик
query: |
  ВЫБРАТЬ
    Контрагент,
    ТипКонтрагента,
    СУММА(ВЫБОР КОГДА вид_движения = "Приход" ТОГДА Сумма ИНАЧЕ -Сумма КОНЕЦ) КАК Сумма
  ИЗ РегистрНакопления.Взаиморасчеты
  ГДЕ (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
    И (&ТипКонтрагента ЕСТЬ ПУСТО ИЛИ ТипКонтрагента = &ТипКонтрагента)
  СГРУППИРОВАТЬ ПО Контрагент, ТипКонтрагента
  УПОРЯДОЧИТЬ ПО Контрагент
