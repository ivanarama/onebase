name: ДвиженияТоваров
title: Движения товаров за период
params:
  - name: НачалоПериода
    type: date
    label: С даты
  - name: КонецПериода
    type: date
    label: По дату
  - name: ВидДвижения
    type: select
    label: Вид движения
    options:
      - ""
      - Приход
      - Расход
query: |
  ВЫБРАТЬ
    Номенклатура,
    Склад,
    вид_движения КАК ВидДвижения,
    СУММА(Количество) КАК Количество,
    СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ (&НачалоПериода ЕСТЬ ПУСТО ИЛИ period >= &НачалоПериода)
    И (&КонецПериода ЕСТЬ ПУСТО ИЛИ period <= &КонецПериода)
    И (&ВидДвижения ЕСТЬ ПУСТО ИЛИ вид_движения = &ВидДвижения)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад, вид_движения
  УПОРЯДОЧИТЬ ПО Номенклатура
