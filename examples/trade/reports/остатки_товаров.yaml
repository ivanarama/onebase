name: ОстаткиТоваров
title: Остатки товаров по складам
params:
  - name: НаДату
    type: date
    label: На дату
query: |
  ВЫБРАТЬ
    Номенклатура,
    Склад,
    СУММА(ВЫБОР КОГДА вид_движения = "Приход" ТОГДА Количество ИНАЧЕ -Количество КОНЕЦ) КАК Количество,
    СУММА(ВЫБОР КОГДА вид_движения = "Приход" ТОГДА Сумма ИНАЧЕ -Сумма КОНЕЦ) КАК Сумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад
  УПОРЯДОЧИТЬ ПО Номенклатура
