name: Накладная
document: РеализацияТоваров
title: "Товарная накладная № {{Номер}} от {{Дата | date}}"

header: |
  **Поставщик**: {{Константы.НашаОрганизация}}

  **Покупатель**: {{Покупатель.Наименование}}

  **Склад отгрузки**: {{Склад.Наименование}}

table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура.Наименование
      label: Наименование товара
    - field: Количество
      label: Кол-во
      align: right
      format: "number:0"
    - field: Цена
      label: Цена, руб.
      align: right
      format: "number:2"
    - field: Сумма
      label: Сумма, руб.
      align: right
      format: "number:2"
  totals:
    - field: Сумма
      sum: true
      label: "Итого"

footer: |
  ___

  Отпустил: _________________________ Получил: _________________________
